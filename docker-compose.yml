version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: academic_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: academic_binder
      MYSQL_USER: academic_user
      MYSQL_PASSWORD: academic_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - academic_network
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build: ./backend
    container_name: academic_backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - academic_network

  ppdrive:
    image: dududaa/ppdrive:latest
    container_name: academic_ppdrive
    ports:
      - "8080:8080"
    volumes:
      - ppdrive_data:/data
    networks:
      - academic_network

volumes:
  mysql_data:
  ppdrive_data:

networks:
  academic_network:
    driver: bridge
