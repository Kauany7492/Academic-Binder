version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: academic_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: academic_binder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - academic_network

  backend:
    build: ./backend
    container_name: academic_backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/credentials:/app/credentials:ro
    networks:
      - academic_network

volumes:
  postgres_data:

networks:
  academic_network:
    driver: bridge
